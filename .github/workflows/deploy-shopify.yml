name: Deploy Shopify Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Push theme to Shopify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy to Shopify (unpublished)
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_STORE" \
            --theme "$SHOPIFY_THEME_ID" \
            --password "$SHOPIFY_PASSWORD" \
            --path . \
            --unpublished

      - name: Output deploy URL
        run: |
          echo "Theme push completed. Check your Shopify admin themes page for the latest unpublished theme ID and preview URL."
